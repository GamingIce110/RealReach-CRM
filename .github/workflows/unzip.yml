name: Unzip Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Unzip into repository root
        run: |
          unzip -o "build-estateflow-crm-app (1).zip" -d .
          rm "build-estateflow-crm-app (1).zip"

      - name: Commit extracted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Extract project files" || echo "Nothing to commit"
          git push